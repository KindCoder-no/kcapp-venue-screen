version: '3.8'

services:
  kcapp-venue-screen:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (res) => {if (res.statusCode !== 200) throw new Error(res.statusCode)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
