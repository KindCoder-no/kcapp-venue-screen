name: Build and Publish Docker Image to DockerHub

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: DockerHub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          pull: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/kcapp-venue-screen:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/kcapp-venue-screen:${{ github.sha }}
          build-args: |
            VITE_KCAPP_API_BASE=${{ vars.VITE_KCAPP_API_BASE }}
            VITE_KCAPP_SOCKET_URL=${{ vars.VITE_KCAPP_SOCKET_URL }}
            VITE_KCAPP_VENUE_LIST_URL=${{ vars.VITE_KCAPP_VENUE_LIST_URL }}
            VITE_KCAPP_BASIC_AUTH_USERNAME=${{ vars.VITE_KCAPP_BASIC_AUTH_USERNAME }}
            VITE_KCAPP_BASIC_AUTH_PASSWORD=${{ vars.VITE_KCAPP_BASIC_AUTH_PASSWORD }}
            VITE_APP_BASE_PATH=${{ vars.VITE_APP_BASE_PATH }}
